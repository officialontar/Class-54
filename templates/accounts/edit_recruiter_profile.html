{% extends "base.html" %}

{% block title %}
Edit Recruiter Profile
{% endblock %}

{% block content %}

<div class="w-full max-w-screen-xl mx-auto my-10 bg-white shadow-xl rounded-xl p-12">

<!-- HEADER -->
<div class="flex justify-center mb-10">
    <div class="border-b-4 border-blue-600 pb-2">
        <h2 class="text-3xl font-bold text-gray-800">
            Edit Recruiter Profile
        </h2>
    </div>
</div>
<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="grid grid-cols-2 gap-6">

<div>
<label class="block text-sm font-semibold mb-1">
First Name <span class="text-red-500">*</span>
</label>
<input type="text" name="first_name" required
value="{{ request.user.first_name }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div>
<label class="block text-sm font-semibold mb-1">
Last Name <span class="text-red-500">*</span>
</label>
<input type="text" name="last_name" required
value="{{ request.user.last_name }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div>
<label class="block text-sm font-semibold mb-1">
Email <span class="text-red-500">*</span>
</label>
<input type="email" name="email" required
value="{{ request.user.email }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div>
<label class="block text-sm font-semibold mb-1">
Phone <span class="text-red-500">*</span>
</label>
<input type="text" name="phone" required
value="{{ request.user.phone }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div>
<label class="block text-sm font-semibold mb-1">
Job Title / Position <span class="text-red-500">*</span>
</label>
<input type="text"
name="job_title"
value="{{ request.user.recruiterprofile.job_title }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div>
<label class="block text-sm font-semibold mb-1">
Location <span class="text-red-500">*</span>
</label>
<input type="text"
name="location"
value="{{ request.user.recruiterprofile.location }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div class="col-span-2">
<label class="block text-sm font-semibold mb-1">
Company Name <span class="text-red-500">*</span>
</label>
<input type="text"
name="company_name"
value="{{ request.user.recruiterprofile.company_name }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div class="col-span-2">
<label class="block text-sm font-semibold mb-1">
Company Website
</label>
<input type="url"
name="company_website"
value="{{ request.user.recruiterprofile.company_website }}"
class="w-full border rounded-lg px-4 py-2">
</div>

<div class="col-span-2">
<label class="block text-sm font-semibold mb-1">
Company Overview
</label>
<textarea
name="company_overview"
rows="4"
class="w-full border rounded-lg px-4 py-2">{{ request.user.recruiterprofile.company_overview }}</textarea>
</div>


<!-- OLD IMAGE PREVIEW -->

<div class="col-span-2">

<label class="block text-sm font-semibold mb-2">
Current Profile Picture
</label>

<img src="{{ request.user.profile_pic.url }}"
class="w-24 h-24 rounded-full object-cover border mb-4">

<label class="block text-sm font-semibold mb-1">
Change Profile Picture
</label>

<input type="file" name="profile_pic"
class="w-full border rounded-lg px-4 py-2">

</div>

</div>


<!-- BUTTON AREA -->

<div class="flex justify-between mt-10">

<a href="{% url 'profile' %}"
class="bg-gray-500 text-white px-6 py-2 rounded-lg back-btn flex items-center gap-2">

← Back

</a>

<button type="submit"
class="update-btn text-white px-8 py-2 rounded-lg">
Update Profile
</button>

</div>

</form>

</div>


<style>

/* UPDATE BUTTON */

.update-btn{
background:#2563eb;
transition:0.3s;
}

.update-btn:hover{
background:#22c55e;
box-shadow:0 0 20px #22c55e,0 0 40px #22c55e;
}

/* BACK BUTTON */

.back-btn{
transition:0.3s;
}

.back-btn:hover{
background:#22c55e;
box-shadow:0 0 20px #22c55e,0 0 40px #22c55e;
}

</style>

{% endblock %}
